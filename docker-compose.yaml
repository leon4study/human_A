version: '3.8'

networks:
  smartfarm-net:
    driver: bridge

services:
  # 1. MQTT 브로커 (메시지 통로)
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/config:/mosquitto/config
    networks:
      - smartfarm-net

  # 2. PostgreSQL (인사이트 저장소)
  smart-db:
    image: postgres:15
    container_name: smart-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./data/db-data:/var/lib/postgresql/data
      # [CRITICAL 수정] 초기 스키마 자동 실행을 위한 마운트
      - ./infra/postgres/initdb.d:/docker-entrypoint-initdb.d
    networks:
      - smartfarm-net

  # 3. MinIO (S3 Mock - 데이터 레이크)
  data-lake:
    image: minio/minio:latest
    container_name: data-lake
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/s3-bucket:/data
    networks:
      - smartfarm-net