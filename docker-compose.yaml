version: '3.8'

networks:
  smartfarm-net:
    driver: bridge

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/config:/mosquitto/config
    networks:
      - smartfarm-net

  smart-db:
    image: postgres:15
    container_name: smart-db
    restart: always
    env_file:
      - ${ENV_FILE}
    ports:
      - "5432:5432"
    volumes:
      - ./data/db-data:/var/lib/postgresql/data
      - ./infra/postgres/initdb.d:/docker-entrypoint-initdb.d
    networks:
      - smartfarm-net

  data-lake:
    image: minio/minio:latest
    container_name: data-lake
    restart: always
    env_file:
      - ${ENV_FILE}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/s3-bucket:/data
    networks:
      - smartfarm-net

  sensor-simulator:
    build: 
      context: ./services/sensor-simulator
    container_name: sensor-simulator
    restart: on-failure
    env_file:
      - ${ENV_FILE}
    depends_on:
      - mqtt-broker
      - data-lake
    networks:
      - smartfarm-net

  backend-hub:
    build:
      context: ./services/backend
    container_name: backend-hub
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ${ENV_FILE}
    depends_on:
      - mqtt-broker
      - smart-db
    networks:
      - smartfarm-net

  s3-sink:
    build:
      context: ./services/s3-sink
    container_name: s3-sink
    restart: always
    env_file:
      - ${ENV_FILE}
    depends_on:
      - mqtt-broker
      - data-lake
    networks:
      - smartfarm-net

  inference-api:
    build:
      context: ./services/inference
    container_name: smart-inference-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ${ENV_FILE}
    volumes:
      - ./services/inference/models:/app/models
    depends_on:
      - smart-db
    networks:
      - smartfarm-net